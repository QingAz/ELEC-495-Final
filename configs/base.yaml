seed: 42
device: auto

system:
  gamma: 0.08
  omega0: 1.5
  force_amp: 0.8
  force_freq: 1.2

data:
  t_end: 40.0
  dt: 0.02
  dt_ref: 0.001
  train_traj: 8
  val_traj: 2
  test_traj: 2
  noise_std: 0.02
  x0_range: [-1.0, 1.0]
  v0_range: [-1.0, 1.0]

train:
  batch_size: 256
  epochs: 200
  lr: 0.001
  hidden: 64
  depth: 3
  rollout_k: 10
  ode_drive_features: true

eval:
  stable_threshold: 100.0
  rollout_seconds: 40.0
  solver_ref_dt: 0.0005
  solver_dts: [0.005, 0.01, 0.02, 0.05, 0.1]
  z0_eval: [1.0, 0.0]
